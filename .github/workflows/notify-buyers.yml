name: Notify buyers on release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send release notification
        env:
          BUYER_NOTIFY_URL: ${{ secrets.BUYER_NOTIFY_URL }}
          BUYER_NOTIFY_SECRET: ${{ secrets.BUYER_NOTIFY_SECRET }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
          NOTES: ${{ github.event.release.body }}
          URL: ${{ github.event.release.html_url }}
        run: |
          if [[ "$TAG" =~ ^v[0-9]+\.0\.0$ ]]; then
            KIND="drop"
          else
            KIND="update"
          fi

          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --arg version "$TAG" \
            --arg notes "$NOTES" \
            --arg url "$URL" \
            --arg kind "$KIND" \
            '{repo: $repo, version: $version, notes: $notes, url: $url, kind: $kind}')

          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$BUYER_NOTIFY_SECRET" | sed 's/^.* //')"

          curl -X POST "$BUYER_NOTIFY_URL" \
            -H "Content-Type: application/json" \
            -H "x-signature-256: $SIGNATURE" \
            -d "$PAYLOAD" \
            --fail-with-body
